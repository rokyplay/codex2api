<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.discordapp.com https:; connect-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://cloudflareinsights.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>codex2api · 错误提示</title>
  <link rel="icon" href="/user/assets/favicon.webp" type="image/webp">
  <link rel="icon" href="/user/assets/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/style.css">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('codex2api_theme');
        if (saved === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      } catch (_) {}
    })();
  </script>
  <style>
    :root {
      --bg-primary: var(--color-bg);
      --bg-secondary: var(--color-bg-secondary);
      --surface: var(--color-surface);
      --border: var(--color-border);
      --text-primary: var(--color-text-primary);
      --text-secondary: var(--color-text-secondary);
      --danger: var(--color-danger);
      --danger-soft: var(--color-danger-bg);
      --shadow: var(--shadow-lg);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .theme-toolbar {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .theme-toggle:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-border-hover);
    }

    .card {
      width: min(100%, 620px);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-secondary);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }

    .desc {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }

    .error-box {
      margin-top: 14px;
      border: 1px solid var(--color-danger-border);
      border-radius: 10px;
      background: var(--danger-soft);
      padding: 10px 12px;
    }

    .error-line {
      margin: 0;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .error-line strong {
      color: var(--danger);
      margin-right: 6px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-border-hover);
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="theme-toolbar">
    <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="切换主题">浅色模式</button>
  </div>
  <section class="card" aria-label="错误提示">
    <h1>发生错误</h1>
    <p class="desc">请求未能完成，请检查参数后重试，或返回登录页重新发起流程。</p>

    <div class="error-box">
      <p class="error-line"><strong>错误代码：</strong><span id="errorCode">unknown_error</span></p>
      <p class="error-line"><strong>错误信息：</strong><span id="errorMessage">发生未知错误，请稍后重试。</span></p>
    </div>

    <div class="actions">
      <a class="btn" href="/login">返回登录</a>
    </div>

    <p class="footer">by Rok & Nan · 出于热爱与好奇而构建 ✨</p>
  </section>

  <script>
    (function () {
      var themeBtn = document.getElementById('themeToggleBtn');
      function syncThemeLabel() {
        if (!themeBtn) return;
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeBtn.textContent = isDark ? '深色模式' : '浅色模式';
      }
      if (themeBtn) {
        themeBtn.addEventListener('click', function () {
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            try { localStorage.setItem('codex2api_theme', 'light'); } catch (_) {}
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            try { localStorage.setItem('codex2api_theme', 'dark'); } catch (_) {}
          }
          syncThemeLabel();
        });
      }
      syncThemeLabel();

      var params = new URLSearchParams(window.location.search || '');
      var code = params.get('error') || 'unknown_error';
      var message = params.get('message') || '发生未知错误，请稍后重试。';

      document.getElementById('errorCode').textContent = code;
      document.getElementById('errorMessage').textContent = message;
    })();
  </script>
</body>
</html>
